name: CI/CD Docker Hub y EC2

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar proyecto Spring Boot
        run: ./mvnw clean package -DskipTests

      - name: Iniciar sesion en Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:latest

      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Desplegar en EC2
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            sudo mkdir -p /mnt/efs/guias

            if ! df -h | grep -q "/mnt/efs"; then
              sudo mount -t nfs4 -o nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport fs-075b460cadcb04f67.efs.us-east-1.amazonaws.com:/ /mnt/efs
            fi

            docker pull lcaviles/gestion-guias:latest
            docker rm -f gestion-guias || true
            docker run -d \
              --name gestion-guias \
              -p 8080:8080 \
              -v /mnt/efs:/app/efs \
              lcaviles/gestion-guias:latest

            docker ps
          EOF